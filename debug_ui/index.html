<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ワンピカAI デバッグUI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;700&display=swap');
  :root {
    --bg: #0e0e12; --surface: #16161e; --surface2: #1e1e2a;
    --border: #2a2a3a; --accent: #e8c547; --accent2: #4fc3f7;
    --red: #ff6b6b; --green: #69db7c; --muted: #666880;
    --text: #e8e8f0; --text2: #9999b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif;
         font-size: 13px; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border);
           padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
  .badge { background: var(--surface2); border: 1px solid var(--border);
           padding: 3px 10px; border-radius: 20px; font-family: 'JetBrains Mono', monospace;
           font-size: 11px; color: var(--text2); }
  .badge.active { border-color: var(--accent); color: var(--accent); }
  .controls { margin-left: auto; display: flex; gap: 8px; }
  button { background: var(--surface2); border: 1px solid var(--border); color: var(--text);
           padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
           font-family: inherit; transition: all 0.15s; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent);
                   font-weight: 700; }
  button.primary:hover { background: #f5d76e; }
  .layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 49px); }
  .board { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .sidebar { background: var(--surface); border-left: 1px solid var(--border);
             display: flex; flex-direction: column; overflow: hidden; }
  .player-zone { background: var(--surface); border: 1px solid var(--border);
                 border-radius: 10px; padding: 14px; }
  .player-zone.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent)20; }
  .player-zone.opponent { border-color: var(--accent2)60; }
  .zone-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .player-label { font-weight: 700; font-size: 13px; }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
          padding: 3px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .stat span { color: var(--text2); margin-right: 4px; }
  .stat.life span { color: var(--red); }
  .stat.don span { color: var(--accent); }
  .cards-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
          padding: 8px 10px; min-width: 90px; cursor: default; transition: all 0.15s;
          position: relative; }
  .card.resting { opacity: 0.55; border-style: dashed; }
  .card.has-rush { border-color: #ff9f43; }
  .card.has-blocker { border-color: var(--accent2); }
  .card.leader { border-color: var(--accent); background: var(--surface2); }
  .card-name { font-weight: 700; font-size: 11px; margin-bottom: 4px; white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
  .card-stats { display: flex; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .pw { color: var(--green); } .co { color: var(--accent); }
  .don-badge { position: absolute; top: -6px; right: -6px; background: var(--accent);
               color: #000; border-radius: 50%; width: 18px; height: 18px;
               font-size: 10px; font-weight: 700; display: flex; align-items: center;
               justify-content: center; font-family: 'JetBrains Mono', monospace; }
  .tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px;
         margin-top: 3px; }
  .tag.rush { background: #ff9f4330; color: #ff9f43; border: 1px solid #ff9f4350; }
  .tag.blocker { background: #4fc3f730; color: var(--accent2); border: 1px solid #4fc3f750; }
  .tag.sick { background: #66668830; color: var(--muted); border: 1px solid #66668850; }
  .section-label { font-size: 10px; color: var(--muted); margin-bottom: 6px;
                   text-transform: uppercase; letter-spacing: 0.08em; }
  .hand-section { margin-top: 10px; }
  .sidebar-title { padding: 12px 16px; border-bottom: 1px solid var(--border);
                   font-size: 12px; font-weight: 700; color: var(--text2);
                   text-transform: uppercase; letter-spacing: 0.08em; }
  .actions-list { flex: 1; overflow-y: auto; padding: 8px; }
  .action-btn { width: 100%; text-align: left; padding: 8px 12px; margin-bottom: 4px;
                background: var(--surface2); border: 1px solid var(--border);
                border-radius: 6px; cursor: pointer; font-size: 11px; color: var(--text);
                font-family: 'JetBrains Mono', monospace; transition: all 0.12s; display: block; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg); }
  .action-btn.end-turn { border-color: var(--red)50; color: var(--red); }
  .action-btn.end-turn:hover { border-color: var(--red); }
  .log-area { border-top: 1px solid var(--border); padding: 8px; height: 160px;
              overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px;
              color: var(--text2); }
  .log-line { padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; }
  .log-line.info { color: var(--accent2); }
  .log-line.warn { color: var(--accent); }
  .log-line.good { color: var(--green); }
  .phase-bar { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border);
               flex-wrap: wrap; }
  .phase-dot { padding: 3px 10px; border-radius: 20px; font-size: 10px;
               background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .phase-dot.active { background: var(--accent)20; border-color: var(--accent); color: var(--accent); }
  .winner-banner { background: var(--accent); color: #000; text-align: center;
                   padding: 12px; font-weight: 700; font-size: 16px; border-radius: 8px; }
  .empty { color: var(--muted); font-size: 11px; padding: 4px 0; }
</style>
</head>
<body>
<header>
  <h1>ワンピカAI — デバッグUI</h1>
  <span class="badge" id="phase-badge">未開始</span>
  <span class="badge" id="turn-badge">Turn —</span>
  <div class="controls">
    <button onclick="randomStep()">ランダム1手</button>
    <button onclick="randomN(10)">ランダム10手</button>
    <button class="primary" onclick="newGame()">新しいゲーム</button>
  </div>
</header>

<div class="layout">
  <div class="board" id="board">
    <div style="color:var(--muted);padding:40px;text-align:center">
      「新しいゲーム」ボタンでゲームを開始してください
    </div>
  </div>
  <div class="sidebar">
    <div class="phase-bar" id="phase-bar"></div>
    <div class="sidebar-title">合法手 / Legal Actions</div>
    <div class="actions-list" id="actions-list"></div>
    <div class="log-area" id="log-area"></div>
  </div>
</div>

<script>
let currentState = null;
const PHASES = ['refresh','draw','don','main','attack','block','damage','end'];

function log(msg, type='') {
  const el = document.getElementById('log-area');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = new Date().toLocaleTimeString('ja', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ' + msg;
  el.prepend(line);
}

async function newGame() {
  const res = await fetch('/api/new_game', {method:'POST'});
  currentState = await res.json();
  render(currentState);
  log('新しいゲームを開始しました', 'good');
}

async function applyAction(idx) {
  const res = await fetch(`/api/action/${idx}`, {method:'POST'});
  const data = await res.json();
  if (data.error) { log('エラー: ' + data.error, 'warn'); return; }
  const prev = currentState;
  currentState = data;
  const act = prev.legal_actions[idx];
  log(`P${prev.current_player}: ${act.label}`, 'info');
  render(currentState);
}

async function randomStep() {
  const res = await fetch('/api/random_step', {method:'POST'});
  const data = await res.json();
  if (data.error) { log(data.error, 'warn'); return; }
  currentState = data;
  render(currentState);
}

async function randomN(n) {
  for (let i = 0; i < n; i++) {
    await randomStep();
    await new Promise(r => setTimeout(r, 50));
  }
}

function cardHTML(c, extraClass='') {
  if (!c) return '';
  const resting = c.is_resting ? ' resting' : '';
  const rush = c.has_rush ? ' has-rush' : '';
  const blocker = c.has_blocker ? ' has-blocker' : '';
  const don = c.don_attached > 0 ? `<div class="don-badge">+${c.don_attached}</div>` : '';
  const tags = [
    c.has_rush ? '<span class="tag rush">速攻</span>' : '',
    c.has_blocker ? '<span class="tag blocker">ブロッカー</span>' : '',
    c.summoning_sick ? '<span class="tag sick">召喚酔い</span>' : '',
  ].join('');
  const power = c.effective_power !== undefined ? c.effective_power : c.power;
  return `<div class="card${resting}${rush}${blocker} ${extraClass}">
    ${don}
    <div class="card-name">${c.name}</div>
    <div class="card-stats">
      <span class="co">C:${c.cost}</span>
      <span class="pw">P:${power}</span>
    </div>
    ${tags}
  </div>`;
}

function render(s) {
  if (!s || s.error) return;

  // ヘッダー更新
  document.getElementById('phase-badge').textContent = s.phase;
  document.getElementById('phase-badge').className = 'badge active';
  document.getElementById('turn-badge').textContent = `Turn ${s.turn}`;

  // フェーズバー
  const phaseBar = document.getElementById('phase-bar');
  phaseBar.innerHTML = PHASES.map(p =>
    `<span class="phase-dot ${p===s.phase?'active':''}">${p}</span>`
  ).join('');

  // ボード
  const board = document.getElementById('board');
  if (s.winner !== null) {
    board.innerHTML = `<div class="winner-banner">Player ${s.winner} の勝利！</div>`;
    document.getElementById('actions-list').innerHTML = '';
    return;
  }

  let html = '';
  [1, 0].forEach(i => {
    const p = s.players[i];
    const isActive = i === s.current_player;
    const label = i === 0 ? '先攻 (赤)' : '後攻 (青)';
    html += `<div class="player-zone ${isActive?'active':'opponent'}">
      <div class="zone-header">
        <div class="player-label">${label}${isActive?' ◀ 手番':''}</div>
        <div class="stats">
          <div class="stat life"><span>LIFE</span>${p.life_count}</div>
          <div class="stat don"><span>DON</span>${p.don_available} / deck:${p.don_deck}</div>
          <div class="stat"><span>手札</span>${p.hand_count}</div>
          <div class="stat"><span>デッキ</span>${p.deck_count}</div>
        </div>
      </div>
      <div class="section-label">リーダー</div>
      <div class="cards-row">${cardHTML(p.leader, 'leader')}</div>
      <div class="section-label" style="margin-top:10px">場のキャラ (${p.field.length}体)</div>
      <div class="cards-row">${p.field.length ? p.field.map(c=>cardHTML(c)).join('') : '<span class="empty">なし</span>'}</div>`;

    if (isActive) {
      html += `<div class="hand-section">
        <div class="section-label">手札</div>
        <div class="cards-row">${p.hand.length ? p.hand.map(c=>cardHTML(c)).join('') : '<span class="empty">なし</span>'}</div>
      </div>`;
    }
    html += `</div>`;
  });

  if (s.pending_attack) {
    html += `<div style="padding:8px 12px;background:var(--surface2);border:1px solid var(--accent);border-radius:8px;font-family:monospace;font-size:12px;color:var(--accent)">
      ⚔ アタック待機中: ${s.pending_attack}
    </div>`;
  }
  board.innerHTML = html;

  // 合法手リスト
  const actList = document.getElementById('actions-list');
  actList.innerHTML = s.legal_actions.map((a, i) => {
    const isEnd = a.type === 'end_turn';
    return `<button class="action-btn ${isEnd?'end-turn':''}" onclick="applyAction(${i})">${a.label}</button>`;
  }).join('');
}
</script>
</body>
</html>
